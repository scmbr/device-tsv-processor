
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB:  "${POSTGRES_DB:-db}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data


  rabbit:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBIT_USERNAME:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBIT_PASSWORD:-guest}"
      RABBITMQ_DEFAULT_VHOST: "${RABBIT_VHOST:-/}"
    ports:
      - "5672:5672"  
      - "15672:15672" 
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbit_data:/var/lib/rabbitmq

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    environment:
      APP_ENV: "${APP_ENV:-prod}"
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-db}"
      RABBIT_USERNAME: "${RABBIT_USERNAME:-guest}"
      RABBIT_PASSWORD: "${RABBIT_PASSWORD:-guest}"
      RABBIT_VHOST: "${RABBIT_VHOST:-/}"
    volumes:
      - ./configs:/app/configs:ro
      - ./input:/app/input
      - ./output:/app/output

  migrate: 
    image: migrate/migrate 
    volumes:
      - ./migrations:/migrations
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-db}"
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-db}?sslmode=disable", "up"]
    links: 
      - db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  rabbit_data: